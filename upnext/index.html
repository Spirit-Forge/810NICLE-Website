<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Up Next | 810NICLE Day</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        body img {
            width: 100%;
            height: auto;
        }

        div.screen {
            min-width: 100vw;
            min-height: calc(100vw * 9 / 16);
        }

        body div.wrapper {
            position: absolute;
            top: 0;
            left: 30vw;
            width: 42vw;
            text-align: center;
            font-size: 2.125rem;
			font-weight: bold;
            color: white;
            text-shadow:		
				1px 1px 3px white,			
				1px 1px 10px #50c6d8,
				3px 3px 2px rgba(0,0,0,0.75);
            margin-top: 3.125rem;
            display: flex;
            flex-flow: row nowrap;
            justify-content: center;
        }

        @font-face {
            font-family: "GoudyTrajan-Regular";
            src: url("../fonts/GoudyTrajan-Regular.woff2");	
        }

        * {
            font-family: "GoudyTrajan-Regular";
        }

        p#up__next__label {
            min-width: 23%;
            text-align: left;
        }

        p#up__next {
            text-align: center;
            max-width: calc(45%);
        }

        marquee {
            min-width: 99%;
            overflow: visible;
            white-space: nowrap;
            margin-top: auto;
            margin-bottom: auto;        
			mask-image: linear-gradient(to right, rgba(255,0,0,0), rgba(255,0,0,1) 5%, rgba(255,0,0,1) 45%, rgba(255,0,0,0) 80%),
						linear-gradient(150deg, rgba(255,0,0,0) 30%, rgba(255,0,0,1), rgba(255,0,0,1) 80%, rgba(255,0,0,0)90%) !important;
        }

        body button {
            margin: 1rem;
            height: 4rem;
            width: 16rem;
            font-size: larger;
        }

        div.button__wrapper {
            display: flex;
            flex-flow: row nowrap;
            justify-content: center;
            width: 99vw;
        }
    </style>
</head>

<body>
    <div class="screen">
        <div class="wrapper">
            <p id="up__next__label">UP NEXT:</p>
            <p id="up__next"></p>
            <!-- CHARACTER LIMIT FOR STATIC: ABOUT 48 -->
        </div>
    </div>
    <div class="button__wrapper">
        <button onclick="reverse()">Reverse</button>
        <button onclick="loadText()">Forward</button>
    </div>
    <script src="upnext.js"></script>
</body>

</html>
