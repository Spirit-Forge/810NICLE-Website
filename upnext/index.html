<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Up Next | 810NICLE Day</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        body img {
            width: 100%;
            height: auto;
        }

        div.screen {
            min-width: 100vw;
            min-height: calc(100vw * 9 / 16);
        }

        body div.wrapper {
            position: absolute;
            top: 0;
            left: 30vw;
            width: 40vw;
            text-align: center;
            font-size: 1.125rem;
            color: white;
            text-shadow: 0 0 10px black;
            margin-top: 3.125rem;
            display: flex;
            flex-flow: row nowrap;
        }

        @font-face {
            font-family: "TradeMarker Light";
            src: url("../fonts/TradeMarker-Light.woff");
        }

        * {
            font-family: "TradeMarker Light";
        }

        p#up__next__label {
            min-width: 14%;
            text-align: left;
            margin-right: 1rem;
        }

        marquee#up__next {
            width: 86%;
            overflow: hidden;
            white-space: nowrap;
            max-height: 20px;
            margin-top: auto;
            margin-bottom: auto;
        }

        body button {
            margin: 1rem;
            height: 4rem;
            width: 16rem;
            font-size: larger;
        }

        div.button__wrapper {
            display: flex;
            flex-flow: row nowrap;
            justify-content: center;
            width: 99vw;
        }
    </style>
</head>

<body>
    <div class="screen">
        <div class="wrapper">
            <p id="up__next__label">Up Next:</p>
            <p id="up__next"></p>
            <!-- CHARACTER LIMIT FOR STATIC: ABOUT 48 -->
        </div>
    </div>
    <div class="button__wrapper">
        <button onclick="reverse()">Reverse</button>
        <button onclick="loadText()">Forward</button>
    </div>
    <script src="upnext.js"></script>
</body>

</html>
