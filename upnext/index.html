<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Up Next | 810NICLE Day</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        body img {
            width: 100%;
            height: auto;
        }

        body div.wrapper {
            position: absolute;
            top: 0;
            left: 30vw;
            width: 40vw;
            text-align: center;
            font-size: 1.125rem;
            color: white;
            text-shadow: 0 0 10px black;
            margin-top: 3.125rem;
            overflow: hidden;
        }

        @font-face {
            font-family: "TradeMarker Light";
            src: url("../fonts/TradeMarker-Light.woff");
        }

        * {
            font-family: "TradeMarker Light";
        }


        p#up__next {
            -moz-animation: marquee 20s linear infinite;
            -webkit-animation: marquee 20s linear infinite;
            animation: marquee 20s linear infinite;
            overflow: hidden;
            min-width: 100vw;
        }

        @-moz-keyframes marquee {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        @-webkit-keyframes marquee {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        @keyframes marquee {
            0% {
                -moz-transform: translateX(100%);
                -webkit-transform: translateX(100%);
                transform: translateX(100%)
            }

            100% {
                -moz-transform: translateX(-100%);
                -webkit-transform: translateX(-100%);
                transform: translateX(-100%);
            }
        }
    </style>
</head>

<body>
    <img src="../img/upnext/Bioday_streamassets_topbar.png">
    <div class="wrapper">
        <p id="up__next">Up Next: Swert Shoots Liam with a Big Laser and He Explodes || Up Next: Swert Shoots Liam with a Big Laser and He Explodes</p>
    </div>
    <!-- <script src="upnext.js"></script> -->
</body>

</html>
